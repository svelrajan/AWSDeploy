name: Deploy IoT Dashboard to AWS

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    resumeUrl:
      description: 'URL of the resume to process'
      required: true
      type: string
jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      ECR_REPO: iot-dashboard

    steps:
    # ✅ Checkout repo
    - name: Checkout repository
      uses: actions/checkout@v5

    # 🔧 Configure AWS
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION }}

    # 🔐 Login to ECR
    - name: Login to ECR
      run: |
        aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
        docker login --username AWS \
        --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

    # 🐳 Build Docker image
    - name: Build Docker Image
      run: docker build -t $ECR_REPO .

    # 🏷 Tag image
    - name: Tag Image
      run: |
        docker tag $ECR_REPO:latest \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPO:latest

    # ⬆ Push image
    - name: Push Image
      run: |
        docker push \
        ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/$ECR_REPO:latest

    # 🚀 Deploy to EC2
    - name: Deploy to EC2
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          IMAGE="${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com/iot-dashboard:latest"

          echo "Deploying image: $IMAGE"

          # Login to ECR from EC2
          aws ecr get-login-password --region ${{ secrets.AWS_REGION }} | \
          docker login --username AWS \
          --password-stdin ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

          docker pull "$IMAGE"
          docker stop iot-dashboard || true
          docker rm iot-dashboard || true
          docker run -d -p 80:80 --name iot-dashboard "$IMAGE"
